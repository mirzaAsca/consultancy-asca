<!doctype html>
<html lang="en">

            <span aria-hidden="true">Alpha Capital</span>

    <template data-fixture="2nd">

        </section>
      </main>
    </template>

    <template data-fixture="3rd">
      <main>
        <section class="pv-top-card">
          <h1 class="text-heading-xlarge">Cara Third</h1>
          <span class="artdeco-entity-lockup__degree">3rd+</span>
          <div class="text-body-medium break-words">Founder</div>
        </section>
      </main>
    </template>

    <template data-fixture="oon">
      <main>
        <section class="pv-top-card">
          <h1 class="text-heading-xlarge">Dino Out</h1>
          <div class="text-body-medium break-words">Angel Investor</div>
          <button
            aria-label="Follow Dino Out for notifications"
            class="artdeco-button--primary"
          ></button>
        </section>
      </main>

    <template data-fixture="unavailable">

        <div class="profile-unavailable">Profile unavailable</div>
      </main>
